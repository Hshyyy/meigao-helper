<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>

  <!-- 背景图片 -->
  <image href="/bg.jpg" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>

  <!-- 半透明遮罩（让文字清晰） -->
  <rect width="1200" height="630" fill="rgba(0,0,0,0.55)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- 装饰线条 -->
  <line x1="100" y1="120" x2="1100" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="590" x2="1100" y2="590" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- 左侧金色装饰条 -->
  <rect x="80" y="160" width="4" height="80" fill="#FCD34D" rx="2"/>
  <rect x="80" y="400" width="4" height="80" fill="#FCD34D" rx="2"/>

  <!-- 右侧金色装饰条 -->
  <rect x="1116" y="160" width="4" height="80" fill="#FCD34D" rx="2"/>
  <rect x="1116" y="400" width="4" height="80" fill="#FCD34D" rx="2"/>

  <!-- H-shy出品 -->
  <text x="600" y="100" font-family="Arial, sans-serif" font-size="50" fill="#FCD34D" text-anchor="middle" font-weight="bold">H-shy出品</text>

  <!-- 分隔线 -->
  <line x1="420" y1="130" x2="780" y2="130" stroke="#FCD34D" stroke-width="2"/>

  <!-- 核心标题 -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="85" fill="white" text-anchor="middle" font-weight="bold">🎓 美高选校助手</text>

  <!-- 副标题 -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)" text-anchor="middle">智能匹配美国寄宿高中</text>

  <!-- 分隔线 -->
  <line x1="300" y1="350" x2="900" y2="350" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- 描述文字 -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="30" fill="#FCD34D" text-anchor="middle">帮你找到适合你的学校，给你Hshy的建议与规划</text>
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="30" fill="#FCD34D" text-anchor="middle">助力你成功圆梦！！！</text>

  <!-- 底部标语 -->
  <text x="600" y="545" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.9)" text-anchor="middle">某些中介最严厉的父亲！</text>

  <!-- 底部装饰 -->
  <rect x="520" y="570" width="160" height="3" fill="#FCD34D" rx="1.5"/>
</svg>